# ---------------------------------------
# File Names Configuration
# ---------------------------------------

# Variables related to academic year start/end dates
ACADEMIC_DATE_START_STRING: "2026-07-01"
ACADEMIC_DATE_END_STRING: "2027-06-30"

# Minimum number of post-call days until another call can be assigned
POST_CALL_DAYS: 2

# Folder names
DATA_DIR: "data"
OUTPUT_DIR: "output"
FLOW_XLSX: "data/flow.xlsx"
HOLIDAYS_XLSX: "data/holidays.xlsx"
NO_CALL_DAYS_XLSX: "data/no_call_days.xlsx"
ROTATION_RULES_XLSX: "data/rotation_rules.xlsx"
SHEET_NAME: "master_block_calendar"
# Columns: name, date — one row per clinic day.
# The day BEFORE each clinic will be blocked as a no-call day (pre_clinic_day).
# Leave as-is if file does not exist; clinics are optional.
CLINIC_DAYS_XLSX: "data/clinic_days.xlsx"
# Partial year mode.
# USE_COMPLETED_CALLS: 0 = generate full-year schedule from scratch (ignores COMPLETED_CALLS_XLSX).
# USE_COMPLETED_CALLS: 1 = seed from COMPLETED_CALLS_XLSX and restart the day after the last completed call.
# Columns in the file: date, [upper level name], [intern name] — blank cells mean no assignment.
USE_COMPLETED_CALLS: 0
COMPLETED_CALLS_XLSX: "data/completed_calls.xlsx"
# Block 1 intern daily calls: set to 1 if interns take call every weekday + weekend in Block 1
# (same as upper level). Set to 0 if Block 1 interns use Night Float (weekdays don't count).
INTERN_BLOCK1_WEEKDAY_CALLS: 1

# PGY3 graduation cutoff: PGY3 residents are excluded from call on this date
# and all dates after (inclusive). PGY2s pick up the remaining upper-level
# shifts. Omit or leave blank to disable (defaults to ACADEMIC_DATE_END + 1,
# i.e. no cutoff). If the date is outside the academic year a warning is
# printed and the cutoff is disabled.
PGY3_CUTOFF_DATE: "2027-06-14"

# Number of times to run the simulation in order to get the best Monte Carlo score
SIMULATION_RUNS: 500

# Name in the flow Excel document
NIGHT_FLOAT_ROTATION_NAME: "NF"

# ---------------------------------------
# Call Scheduler Configuration
# ---------------------------------------
#Multiplier to score calculation if on an "avoid" rotation
#AVOID_WEIGHT: 1.5

# ---------------------------------------
# Spacing Rules
# ---------------------------------------
#Number in days in which a penalty should be applied to avoid a call
#Ex. Really avoid scheduling a call within 7 days, and try to avoid within 14 days

#Days specified
MIN_SPACING_DAYS_STRONG: 7
MIN_SPACING_DAYS_MILD: 14

# Rolling-window hard cap: prevents "every-3-days for a month" burst patterns.
# After MAX_CALLS_IN_WINDOW calls in any ROLLING_WINDOW_DAYS window, the resident
# is ineligible until the oldest call rolls out of the window (≈ full week break).
# Set MAX_CALLS_IN_WINDOW to 0 to disable.
MAX_CALLS_IN_WINDOW: 3
ROLLING_WINDOW_DAYS: 14

#Multiplier values
#SPACING_WEIGHT: 2.0

# ---------------------------------------
# PGY2 / PGY3 Year Balancing
# ---------------------------------------
#Multiplier to prioritize "front-loading" the year with PGY3 and "backloading" with PGY2
#1 means no balancing occurs
#YEAR_WEIGHT: 2.0

# ---------------------------------------
# Fairness Tightness
# ---------------------------------------
#Multipliers to score calculations
#General multiplier that exacerbates decreasing different call numbers
#FAIRNESS_WEIGHT: 2.0
#Multiplier when "max_diff_soft" difference in call numbers reached
#SOFT_DIFF_MULTIPLIER: 1.5
#Multiplier when "max_diff_soft" difference in call numbers reached
#HARD_DIFF_MULTIPLIER: 3.0

MAX_DIFF_SOFT: 3
MAX_DIFF_HARD: 4



# ---------------------------------------
# Weighted candidate ranking
# ---------------------------------------
# These weights are used inside the weighted score after the hard/soft
# fairness thresholds are applied lexicographically.

FAIRNESS_GAP_WEIGHT: 3.0
SPACING_WEIGHT: 1.0
AVOID_WEIGHT: 0.25
YEAR_BIAS_WEIGHT: 1.5
# Rate-based pacing: each resident has an expected call count by date d, computed
# from their share of every day's statically-eligible pool (rotation + no_call).
# Residents ahead of their expected pace are deprioritized; residents behind pace
# are preferred. Smooths ad-hoc concentration when fairness catches up aggressively.
PACE_WEIGHT: 1.0
# Look-ahead bias: residents with fewer remaining eligible days through year-end
# are preferred now. Pairs with pacing: pace smooths concentration after the
# fact; lookahead is anticipatory, pushing residents forward before their
# remaining runway shrinks. Prevents bunching when eligibility is front/back loaded.
LOOKAHEAD_WEIGHT: 3.0

# ---------------------------------------
# Monte Carlo schedule ranking priority
# ---------------------------------------
# Earlier items have higher priority when selecting the best full-year schedule.

MONTE_CARLO_SCORE_ORDER:
  - errors
  - unassigned
  - upper_weekend_diff
  - upper_weekday_diff
  - pgy2_total_diff
  - pgy3_total_diff
  - intern_weekend_diff
  - avoid_assignments
  - warnings

# ---------------------------------------
# Pick-candidate rank priority
# ---------------------------------------
# Earlier items have higher priority when ranking eligible candidates.

PICK_CANDIDATE_RANK_ORDER:
  - hard_diff_flag
  - soft_diff_flag
  - weighted_score








